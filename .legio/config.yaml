# Legio configuration
# See: https://github.com/katyella/legio

project:
  name: legio
  root: /Users/mattwojtowicz/dev/legio
  canonicalBranch: main
agents:
  manifestPath: .legio/agent-manifest.json
  baseDir: .legio/agent-defs
  maxConcurrent: 25
  staggerDelayMs: 2000
  maxDepth: 2
worktrees:
  baseDir: .legio/worktrees
taskTracker:
  backend: auto
  enabled: true
mulch:
  enabled: true
  domains: []
  primeFormat: markdown
merge:
  aiResolveEnabled: true
  reimagineEnabled: false
watchman:
  tier0Enabled: true
  tier0IntervalMs: 30000
  tier1Enabled: false
  tier2Enabled: false
  staleThresholdMs: 300000
  zombieThresholdMs: 600000
  nudgeIntervalMs: 60000
  mailIntervalMs: 5000
  reNudgeIntervalMs: 10000
  warnAfterMs: 60000
  beaconNudgeMs: 20000
autopilot:
  intervalMs: 10000
  autoMerge: true
  autoCleanWorktrees: false
models:
logging:
  verbose: false
  redactSecrets: true
